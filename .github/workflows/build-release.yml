name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.4.1)'
        required: true
        default: 'v1.4.1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36 & build-tools
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-36" "build-tools;35.0.1" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/pesalytics-release.jks

      - name: Build optimized release APK
        run: ./gradlew assembleRelease --no-daemon --build-cache
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/pesalytics-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=pesalytics-release-$(git describe --tags --abbrev=0 2>/dev/null || echo ${{ github.event.inputs.tag || github.ref_name }}).apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv "${{ steps.apk.outputs.path }}" "app/build/outputs/apk/release/${{ steps.apk.outputs.name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pesalytics-release-apk
          path: app/build/outputs/apk/release/${{ steps.apk.outputs.name }}
          retention-days: 30

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.value }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk -v ver="[$VERSION]" '
            $0 ~ "^## \\" ver {p=1; print; next}
            p && /^## \[/ {exit}
            p
          ' CHANGELOG.md | sed -e '/^---$/d' -e '${/^$/d}')
          if [ -z "$NOTES" ]; then
            NOTES="_No changelog entry found for $VERSION in CHANGELOG.md — add one before tagging next time._"
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "Pesalytics ${{ steps.tag.outputs.value }}"
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/${{ steps.apk.outputs.name }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ### Installation
            Download the APK from the **Assets** section below. Enable *Install from unknown sources* on your Android device, then open the file to install.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for full history.
